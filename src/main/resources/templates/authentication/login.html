<!DOCTYPE html>
<html lang="en"  xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="authentication/Login.css">
</head>
<body>
<div class="container">
  <h1>Login</h1>

  <div class="alert alert-primary" role="alert" th:if="${param.register != null}">
    Thanks for your registration. Please log in!
  </div>

  <div class="alert alert-primary" role="alert" th:if="${param.logout != null}">
    You have successfully logged out!
  </div>

  <div class="alert alert-danger" role="alert" th:if="${param.error != null}">
    Email or password invalid. Please try again.!
  </div>

  <form th:action="@{/login}" method="post"  th:object="${member}">
    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" th:field="*{email}"  required>
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" th:field="*{password}" required>
    </div>

    <div class="d-flex align-items-center justify-content-between mb-4">
      <div class="form-check">
        <input class="form-check-input primary" type="checkbox" value="" th:field="*{rememberMe}" id="flexCheckChecked" checked>
        <label class="form-check-label text-dark" for="flexCheckChecked">
          Remember this Device
        </label>
      </div>
      <a class="text-primary fw-bold" href="/">Forgot Password ?</a>
    </div>
    <input type="submit" class="btn btn-primary w-100 py-8 fs-4 mb-4 rounded-2" value="Login" />
  </form>
  <div class="footer">
    <p>Don't have an account? <a href="/register">Register here</a></p>
  </div>
</div>
</body>
</html>
