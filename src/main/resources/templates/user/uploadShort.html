<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Short</title>
  <link rel="stylesheet" href="/user/css/style.css">
  <style>
    body { background:#0f0f0f; color:#f1f1f1; font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif; }
    .card { max-width: 720px; margin: 40px auto; background:#111; border:1px solid #222; border-radius:16px; padding:24px; }
    .row { display:flex; flex-direction:column; gap:12px; }
    input[type="text"], input[type="file"] { background:#0f0f0f; color:#fff; border:1px solid #333; border-radius:8px; padding:10px 12px; }
    button { background:#2563eb; color:#fff; border:none; border-radius:9999px; padding:10px 18px; cursor:pointer; }
    button:hover { background:#1d4ed8; }
    a { color:#9ca3af; }
  </style>
  </head>
<body>
<div class="card">
  <h2>Upload a Short</h2>
  <p>Upload a vertical short video (mp4). After upload, you can share, like and comment from the Shorts page.</p>
  <form th:action="@{/shorts/upload}" method="post" enctype="multipart/form-data" class="row">
    <label>Title
      <input type="text" name="title" placeholder="Optional title">
    </label>
    <label>Video File
      <input type="file" name="file" accept="video/**" required>
    </label>
    <div>
      <button type="submit">Upload Short</button>
      <a th:href="@{/shorts}">Back to Shorts</a>
    </div>
  </form>
</div>
</body>
</html>
